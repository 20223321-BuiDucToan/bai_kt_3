<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#ffffff"/>

  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 2; }
    .title { font: 700 20px Arial, sans-serif; fill: #111; }
    .text { font: 16px Arial, sans-serif; fill: #222; }
    .line { stroke: #444; stroke-width: 3; fill: none; }
    .label { font: 700 16px Arial, sans-serif; fill: #0b57d0; }
  </style>

  <rect class="box" x="70" y="80" width="280" height="120"/>
  <text class="title" x="90" y="115">Classroom</text>
  <text class="text" x="90" y="150">id (PK)</text>
  <text class="text" x="90" y="180">class_name</text>

  <rect class="box" x="70" y="310" width="320" height="150"/>
  <text class="title" x="90" y="345">Student</text>
  <text class="text" x="90" y="380">id (PK)</text>
  <text class="text" x="90" y="410">student_name</text>
  <text class="text" x="90" y="440">class_id (FK -&gt; Classroom.id)</text>
  <text class="text" x="90" y="470">is_active</text>

  <rect class="box" x="770" y="80" width="280" height="120"/>
  <text class="title" x="790" y="115">Subject</text>
  <text class="text" x="790" y="150">id (PK)</text>
  <text class="text" x="790" y="180">subject_name</text>

  <rect class="box" x="710" y="330" width="360" height="170"/>
  <text class="title" x="730" y="365">student_subject</text>
  <text class="text" x="730" y="400">student_id (PK, FK -&gt; Student.id)</text>
  <text class="text" x="730" y="430">subject_id (PK, FK -&gt; Subject.id)</text>
  <text class="text" x="730" y="460">score</text>
  <text class="text" x="730" y="490">registered_at</text>

  <path class="line" d="M210 200 L210 310"/>
  <text class="label" x="225" y="255">1 - n</text>

  <path class="line" d="M390 385 L710 385"/>
  <text class="label" x="500" y="368">n - n qua pivot</text>

  <path class="line" d="M910 200 L910 330"/>
  <text class="label" x="925" y="265">1 - n</text>
</svg>
